
# ── Settings ──────────────────────────────────────────────────────────────────

# Constrain window size to the max size of any client connected to *that window*
# rather than the whole session
setw -g aggressive-resize on

# Activity monitoring
setw -g monitor-activity off
set -g visual-activity off

# Scrollback buffer
set-option -g history-limit 10000

# Start window and pane indexes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set-option -g set-clipboard on

# Reduce delay when switching to normal mode
set -s escape-time 0



# ── Keybindings ───────────────────────────────────────────────────────────────

# Vi mode for copy mode
setw -g mode-keys vi

# Prefix: ctrl+space
set -g prefix C-Space
bind C-Space send-prefix

# Clear scrollback history
bind-key C-h clear-history

# Switch to last window / last session
unbind-key [
bind-key [ last-window
unbind-key ]
bind-key ] switch-client -l

# Session and tree picker
bind s choose-session -O time
bind t choose-tree -O time

# Find window by name
bind-key f command-prompt "find-window -N '%%'"

# Cycle layouts
bind-key o next-layout

# Pane navigation (vim-style, with prefix)
bind-key h select-pane -L
bind-key l select-pane -R
bind-key j select-pane -D
bind-key k select-pane -U

# Window navigation (no prefix)
bind-key -n M-h previous-window
bind-key -n M-l next-window

# ── Copy mode ─────────────────────────────────────────────────────────────────

bind space copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection
bind -T copy-mode-vi H send -X halfpage-up
bind -T copy-mode-vi L send -X halfpage-down



# ── Plugins (TPM) ─────────────────────────────────────────────────────────────

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'
set -g @resurrect-dir '~/.tmux/resurrect'

set -g @plugin '2kabhishek/tmux2k'
set -g @tmux2k-theme 'duo'
set -g @tmux2k-military-time true
set -g @tmux2k-start-icon "session"
set -g @tmux2k-icons-only true

# Keep near bottom — initializes TPM
run '~/.tmux/plugins/tpm/tpm'



# ── Appearance ────────────────────────────────────────────────────────────────
# Must come after plugin load to take effect

set-option -g status-position top

# Window status — inactive (dark grey) / active (pastel blue)
set -g window-status-format "#[bg=colour235]  #I.#W  "
set -g window-status-current-format "#[bg=colour111,fg=colour235,bold]  #I.#W  "

# True colour support
set-option -sga terminal-features ',xterm-256color:RGB'
set-option -sga terminal-features ',tmux-256color:RGB'
